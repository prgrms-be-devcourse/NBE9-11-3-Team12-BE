services:
  mysql:
    image: mysql:8.0
    container_name: rungo-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Seoul

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - rungo-network

  redis:
    image: redis:7
    container_name: rungo-redis
    restart: always

    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: Asia/Seoul

    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}

    networks:
      - rungo-network

  app:
    image: ${APP_IMAGE}
    container_name: rungo-app
    restart: always

    depends_on:
      - mysql
      - redis

    env_file:
      - .env

    environment:
      TZ: Asia/Seoul

    volumes:
      - ./uploads:/app/uploads

    networks:
      - rungo-network

  nginx:
    image: nginx:1.27
    container_name: rungo-nginx
    restart: always

    depends_on:
      - app

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/app/uploads

    networks:
      - rungo-network

volumes:
  mysql-data:

networks:
  rungo-network:
    driver: bridge