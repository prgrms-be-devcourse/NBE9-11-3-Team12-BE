name: CD

# 운영 배포 workflow
# main 브랜치에 push될 때 실행
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # GHCR push 권한
    permissions:
      contents: read
      packages: write

    steps:
      # 레포 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub Container Registry 로그인
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker 이미지 빌드
      # backend/Dockerfile 내부에서 bootJar 생성
      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/prgrms-be-devcourse/rungo-backend:latest \
            ./backend

      # GHCR에 Docker 이미지 업로드
      - name: Push Docker image
        run: |
          docker push ghcr.io/prgrms-be-devcourse/rungo-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # deploy job에서도 레포 코드 가져오기
      # scp로 docker-compose.prod.yml, nginx.conf를 업로드하려면 필요
      - name: Checkout
        uses: actions/checkout@v4

      # EC2 배포 디렉토리 생성
      - name: Prepare EC2 deploy directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p ~/app

      # EC2에 docker-compose.prod.yml, nginx.conf 업로드
      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "~/app"

      # EC2 접속 후 docker compose 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            cd ~/app

            # 운영 환경 변수 파일 생성
            cat << 'EOF' > .env
            ${{ secrets.ENV_FILE }}
            EOF

            # .env 값을 현재 shell에서도 사용할 수 있도록 로드
            set -a
            . ./.env
            set +a
            
            # 업로드 파일 저장 디렉토리 생성
            mkdir -p uploads

            # 백업 디렉토리 생성
            mkdir -p ~/app/backups/mysql
            mkdir -p ~/app/backups/redis    

            # MySQL 자동 백업
            # 배포 전 현재 운영 DB를 SQL 파일로 백업
            echo "==== MySQL backup ===="
            if docker ps --format '{{.Names}}' | grep -q '^rungo-mysql$'; then
              docker exec rungo-mysql mysqldump \
                -uroot \
                -p"${MYSQL_ROOT_PASSWORD}" \
                --single-transaction \
                --routines \
                --triggers \
                rungo \
                > ~/app/backups/mysql/rungo_mysql_$(date +%Y%m%d_%H%M%S).sql

              # 7일 지난 MySQL 백업 삭제
              find ~/app/backups/mysql -name "rungo_mysql_*.sql" -type f -mtime +7 -delete

              echo "MySQL backup created."
              ls -lh ~/app/backups/mysql | tail -5
            else
              echo "rungo-mysql container is not running. Skip MySQL backup."
            fi

            # Redis 자동 백업
            # 배포 전 현재 Redis 데이터를 RDB 파일로 백업
            echo "==== Redis backup ===="
            if docker ps --format '{{.Names}}' | grep -q '^rungo-redis$'; then
              docker exec rungo-redis redis-cli \
                -a "${REDIS_PASSWORD}" \
                --no-auth-warning \
                SAVE

              docker cp rungo-redis:/data/dump.rdb \
                ~/app/backups/redis/rungo_redis_$(date +%Y%m%d_%H%M%S).rdb

              # 7일 지난 Redis 백업 삭제
              find ~/app/backups/redis -name "rungo_redis_*.rdb" -type f -mtime +7 -delete

              echo "Redis backup created."
              ls -lh ~/app/backups/redis | tail -5
            else
              echo "rungo-redis container is not running. Skip Redis backup."
            fi                 
            
            # GHCR private image pull을 위한 로그인
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            
            # docker compose 설정 검증
            docker compose -f docker-compose.prod.yml config

            # 최신 이미지 pull 및 컨테이너 실행
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # 사용하지 않는 이미지 정리
            docker image prune -f
            
            # 배포 후 health check
            echo "==== Health check ===="
            for i in {1..12}; do
              if curl -fsS https://api.rungoapp.net/actuator/health | grep -q '"status":"UP"'; then
                echo "Health check passed."
                exit 0
              fi

              echo "Waiting for application health... attempt=$i"
              sleep 10
            done

            echo "Health check failed."
            docker compose -f docker-compose.prod.yml ps
            docker logs rungo-app --tail=100
            exit 1