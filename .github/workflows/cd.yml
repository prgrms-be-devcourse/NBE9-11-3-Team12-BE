name: CD

# 운영 배포 workflow
# main 브랜치에 push될 때 실행
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # GHCR push 권한
    permissions:
      contents: read
      packages: write

    steps:
      # 레포 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub Container Registry 로그인
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker 이미지 빌드
      # backend/Dockerfile 내부에서 bootJar 생성
      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/prgrms-be-devcourse/rungo-backend:latest \
            ./backend

      # GHCR에 Docker 이미지 업로드
      - name: Push Docker image
        run: |
          docker push ghcr.io/prgrms-be-devcourse/rungo-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # deploy job에서도 레포 코드 가져오기
      # scp로 docker-compose.prod.yml, nginx.conf를 업로드하려면 필요
      - name: Checkout
        uses: actions/checkout@v4

      # EC2 배포 디렉토리 생성
      - name: Prepare EC2 deploy directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p ~/app

      # EC2에 docker-compose.prod.yml, nginx.conf 업로드
      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "~/app"

      # EC2 접속 후 docker compose 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            cd ~/app

            # 운영 환경 변수 파일 생성
            cat << 'EOF' > .env
            ${{ secrets.ENV_FILE }}
            EOF

            # 업로드 파일 저장 디렉토리 생성
            mkdir -p uploads

            # GHCR private image pull을 위한 로그인
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            # 최신 이미지 pull 및 컨테이너 실행
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # 사용하지 않는 이미지 정리
            docker image prune -f